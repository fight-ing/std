<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI 数据分析师能力图谱与学习清单</title>
<style>
:root {
  --brand-primary: #3370FF;
  --brand-primary-hover: #5589FF;
  --brand-primary-active: #245BDB;
  --brand-primary-bg: #E8F3FF;
  --brand-primary-border: #94BFFF;

  --text-primary: #1F2329;
  --text-secondary: #4E5969;
  --text-tertiary: #86909C;
  --text-disabled: #C9CDD4;
  --text-inverse: #FFFFFF;
  --bg-page: #F2F3F5;
  --bg-card: #FFFFFF;
  --bg-secondary: #FAFBFC;
  --bg-hover: #F5F6F7;
  --border-base: #E5E6EB;
  --border-light: #F2F3F5;

  --success: #00B42A;
  --success-bg: #E8FFEA;
  --warning: #FF7D00;
  --warning-bg: #FFF7E8;
  --danger: #F53F3F;
  --danger-bg: #FFECE8;
  --purple: #722ED1;
  --purple-bg: #F5E8FF;
  --cyan: #14C9C9;
  --cyan-bg: #E8FFFB;
  --gold: #D4A24C;
  --gold-bg: #FFF7E8;

  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 12px;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);

  --font-sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { font-family: var(--font-sans); color: var(--text-primary); background: var(--bg-page); -webkit-font-smoothing: antialiased; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: var(--brand-primary); text-decoration: none; }
a:hover { color: var(--brand-primary-hover); text-decoration: underline; }

/* ============ 顶部导航 ============ */
.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-base);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.brand-icon {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, #3370FF 0%, #14C9C9 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.brand-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.2;
}
.brand-subtitle {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 2px;
}
.header-stats {
  display: flex;
  gap: 24px;
  align-items: center;
}
.stat {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
.stat-value {
  font-size: 18px;
  font-weight: 600;
  font-family: var(--font-mono);
  color: var(--brand-primary);
  line-height: 1.2;
}
.stat-label {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

/* ============ Tab 切换 ============ */
.tabs {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-base);
  position: sticky;
  top: 69px;
  z-index: 99;
}
.tabs-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
}
.tab-btn {
  padding: 14px 16px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tab-btn:hover { color: var(--brand-primary); }
.tab-btn.active {
  color: var(--brand-primary);
  border-bottom-color: var(--brand-primary);
}
.tab-btn .count {
  font-size: 12px;
  background: var(--border-light);
  color: var(--text-tertiary);
  padding: 1px 6px;
  border-radius: 10px;
  font-family: var(--font-mono);
}
.tab-btn.active .count {
  background: var(--brand-primary-bg);
  color: var(--brand-primary);
}

/* ============ 主体内容 ============ */
.main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px;
}
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============ 能力图谱卡片 ============ */
.intro-banner {
  background: linear-gradient(135deg, #E8F3FF 0%, #F5E8FF 100%);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin-bottom: 24px;
  border: 1px solid var(--border-light);
}
.intro-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.intro-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}
.intro-desc .highlight {
  color: var(--brand-primary);
  font-weight: 500;
}
.intro-tags {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.intro-tag {
  font-size: 12px;
  padding: 4px 10px;
  background: rgba(255,255,255,0.7);
  border: 1px solid var(--border-light);
  border-radius: 20px;
  color: var(--text-secondary);
}

.domain-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.domain-card {
  background: var(--bg-card);
  border: 1px solid var(--border-base);
  border-radius: var(--radius-lg);
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}
.domain-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  background: var(--card-color, var(--brand-primary));
  transition: width 0.25s ease;
  pointer-events: none;
}
.domain-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--card-color, var(--brand-primary));
}
.domain-card:hover::before { width: 100%; opacity: 0.04; }

.domain-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.domain-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  background: var(--card-bg, var(--brand-primary-bg));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.domain-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
}
.domain-name-sub {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 2px;
  font-family: var(--font-mono);
}
.domain-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 14px;
  min-height: 60px;
}
.domain-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}
.chip {
  font-size: 11px;
  padding: 2px 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-light);
  color: var(--text-secondary);
  border-radius: 4px;
}
.domain-tiers {
  display: flex;
  gap: 8px;
  padding-top: 12px;
  border-top: 1px dashed var(--border-light);
}
.tier-stat {
  flex: 1;
  text-align: center;
}
.tier-num {
  font-size: 16px;
  font-weight: 600;
  font-family: var(--font-mono);
  line-height: 1.2;
}
.tier-num.junior { color: var(--success); }
.tier-num.mid { color: var(--warning); }
.tier-num.senior { color: var(--danger); }
.tier-name {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

/* 卡片颜色主题 */
.theme-foundation { --card-color: #3370FF; --card-bg: #E8F3FF; }
.theme-business   { --card-color: #722ED1; --card-bg: #F5E8FF; }
.theme-sql        { --card-color: #14C9C9; --card-bg: #E8FFFB; }
.theme-excel      { --card-color: #00B42A; --card-bg: #E8FFEA; }
.theme-python     { --card-color: #165DFF; --card-bg: #E8F3FF; }
.theme-stats      { --card-color: #F7BA1E; --card-bg: #FFF7E8; }
.theme-viz        { --card-color: #FF7D00; --card-bg: #FFF7E8; }
.theme-bi         { --card-color: #D91AD9; --card-bg: #FCE8FC; }
.theme-warehouse  { --card-color: #4080FF; --card-bg: #E8F3FF; }
.theme-ml         { --card-color: #F53F3F; --card-bg: #FFECE8; }
.theme-ai         { --card-color: #00B2A9; --card-bg: #E8FFFB; }
.theme-soft       { --card-color: #D4A24C; --card-bg: #FFF7E8; }

/* ============ 学习清单 ============ */
.list-toolbar {
  background: var(--bg-card);
  border: 1px solid var(--border-base);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.search-box {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-box input {
  width: 100%;
  height: 36px;
  padding: 0 12px 0 36px;
  border: 1px solid var(--border-base);
  border-radius: var(--radius-md);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
  background: var(--bg-secondary);
}
.search-box input:focus {
  border-color: var(--brand-primary);
  background: var(--bg-card);
}
.search-box::before {
  content: '🔍';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  opacity: 0.5;
}
.filter-group {
  display: flex;
  gap: 4px;
  background: var(--bg-page);
  padding: 4px;
  border-radius: var(--radius-md);
}
.filter-btn {
  padding: 6px 12px;
  font-size: 13px;
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  transition: all 0.2s;
}
.filter-btn:hover { color: var(--brand-primary); }
.filter-btn.active {
  background: var(--bg-card);
  color: var(--brand-primary);
  font-weight: 500;
  box-shadow: var(--shadow-sm);
}
.progress-info {
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
}
.progress-info .num {
  color: var(--brand-primary);
  font-weight: 600;
  font-family: var(--font-mono);
}

.skill-section {
  background: var(--bg-card);
  border: 1px solid var(--border-base);
  border-radius: var(--radius-lg);
  margin-bottom: 12px;
  overflow: hidden;
}
.section-header {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}
.section-header:hover { background: var(--bg-hover); }
.section-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-md);
  background: var(--card-bg, var(--brand-primary-bg));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.section-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
}
.section-meta {
  font-size: 12px;
  color: var(--text-tertiary);
  display: flex;
  gap: 12px;
}
.section-meta .progress-bar {
  width: 80px;
  height: 6px;
  background: var(--border-light);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
  top: 2px;
}
.section-meta .progress-fill {
  height: 100%;
  background: var(--card-color, var(--brand-primary));
  transition: width 0.3s;
}
.expand-icon {
  font-size: 12px;
  color: var(--text-tertiary);
  transition: transform 0.2s;
}
.skill-section.expanded .expand-icon { transform: rotate(90deg); }
.section-body {
  display: none;
  border-top: 1px solid var(--border-light);
  padding: 8px 0;
}
.skill-section.expanded .section-body { display: block; }

.skill-item {
  padding: 12px 20px 12px 64px;
  border-bottom: 1px solid var(--border-light);
  display: grid;
  grid-template-columns: 24px 1fr auto;
  gap: 12px;
  align-items: start;
  position: relative;
}
.skill-item:last-child { border-bottom: none; }
.skill-item:hover { background: var(--bg-secondary); }
.skill-check {
  width: 18px;
  height: 18px;
  border: 1.5px solid var(--border-base);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.skill-check:hover { border-color: var(--brand-primary); }
.skill-check.checked {
  background: var(--brand-primary);
  border-color: var(--brand-primary);
}
.skill-check.checked::after {
  content: '✓';
  color: white;
  font-size: 12px;
  font-weight: bold;
}
.skill-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.skill-item.checked .skill-name {
  color: var(--text-tertiary);
  text-decoration: line-through;
}
.skill-desc {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
  line-height: 1.6;
}
.skill-resources {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.resource-link {
  font-size: 12px;
  color: var(--brand-primary);
  padding: 2px 8px;
  background: var(--brand-primary-bg);
  border-radius: 4px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.resource-link:hover { background: #D6E4FF; text-decoration: none; }
.resource-link .rtype {
  font-size: 10px;
  opacity: 0.7;
  text-transform: uppercase;
}
.tier-badge {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 500;
  white-space: nowrap;
}
.tier-badge.junior { background: var(--success-bg); color: var(--success); }
.tier-badge.mid { background: var(--warning-bg); color: var(--warning); }
.tier-badge.senior { background: var(--danger-bg); color: var(--danger); }

.must-badge {
  font-size: 11px;
  padding: 2px 6px;
  background: #FFECE8;
  color: #F53F3F;
  border-radius: 3px;
  font-weight: 500;
}

/* ============ 评估标准 Tab ============ */
.eval-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
@media (max-width: 900px) {
  .eval-grid { grid-template-columns: 1fr; }
}
.eval-card {
  background: var(--bg-card);
  border: 1px solid var(--border-base);
  border-radius: var(--radius-lg);
  padding: 24px;
  position: relative;
  overflow: hidden;
}
.eval-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 4px;
  background: var(--card-color);
  pointer-events: none;
}
.eval-card.junior { --card-color: #00B42A; --card-bg: #E8FFEA; }
.eval-card.mid    { --card-color: #FF7D00; --card-bg: #FFF7E8; }
.eval-card.senior { --card-color: #F53F3F; --card-bg: #FFECE8; }
.eval-level {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.eval-level-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  background: var(--card-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}
.eval-level-name {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}
.eval-level-en {
  font-size: 12px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  margin-top: 2px;
}
.eval-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
}
.eval-row:last-of-type { border-bottom: none; }
.eval-label { color: var(--text-tertiary); }
.eval-value { color: var(--text-primary); font-weight: 500; }
.eval-desc {
  margin-top: 16px;
  padding: 12px;
  background: var(--card-bg);
  border-radius: var(--radius-md);
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.eval-section {
  background: var(--bg-card);
  border: 1px solid var(--border-base);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 16px;
}
.eval-section h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.eval-section h3::before {
  content: '';
  display: inline-block;
  width: 4px;
  height: 16px;
  background: var(--brand-primary);
  border-radius: 2px;
}
.eval-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.eval-table th, .eval-table td {
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border-light);
}
.eval-table th {
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-weight: 500;
  font-size: 12px;
}
.eval-table tr:hover td { background: var(--bg-hover); }
.eval-table td.center { text-align: center; }
.dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin: 0 2px;
}
.dot.filled.junior { background: var(--success); }
.dot.filled.mid { background: var(--warning); }
.dot.filled.senior { background: var(--danger); }
.dot.empty { background: var(--border-base); }

/* ============ 面试题库 ============ */
.interview-card {
  background: var(--bg-card);
  border: 1px solid var(--border-base);
  border-radius: var(--radius-lg);
  margin-bottom: 12px;
  overflow: hidden;
}
.interview-header {
  padding: 16px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  user-select: none;
  transition: background 0.2s;
}
.interview-header:hover { background: var(--bg-hover); }
.interview-q {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
}
.interview-card.expanded .expand-icon { transform: rotate(90deg); }
.interview-body {
  display: none;
  padding: 0 20px 16px 20px;
  border-top: 1px solid var(--border-light);
  padding-top: 14px;
}
.interview-card.expanded .interview-body { display: block; }
.interview-section {
  margin-bottom: 12px;
}
.interview-section-title {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: 6px;
  font-weight: 500;
}
.interview-content {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
  background: var(--bg-secondary);
  padding: 12px;
  border-radius: var(--radius-md);
  border-left: 3px solid var(--brand-primary);
}
.interview-tag {
  font-size: 11px;
  padding: 2px 8px;
  background: var(--brand-primary-bg);
  color: var(--brand-primary);
  border-radius: 10px;
}

/* ============ 路径规划 ============ */
.path-container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
@media (max-width: 900px) {
  .path-container { grid-template-columns: 1fr; }
}
.path-card {
  background: var(--bg-card);
  border: 1px solid var(--border-base);
  border-radius: var(--radius-lg);
  padding: 20px;
  position: relative;
}
.path-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-light);
}
.path-num {
  width: 28px;
  height: 28px;
  background: var(--brand-primary);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-mono);
}
.path-title {

/* 学习清单 section */

}

var STORAGE_KEY = 'bi_skill_map_checked_v1';

var $  = function(sel, root) { return (root || document).querySelector(sel); };
var $$ = function(sel, root) { return Array.prototype.slice.call((root || document).querySelectorAll(sel)); };
var esc = function(s) {
  if (s === null || s === undefined) s = '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
};

function loadChecked() {
  try { var raw = localStorage.getItem(STORAGE_KEY); return raw ? new Set(JSON.parse(raw)) : new Set(); }
  catch (e) { return new Set(); }
}
function saveChecked(set) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([].concat([...set]))); } catch (e) {}
}
var CHECKED = loadChecked();

  var m = {};
  DOMAINS.forEach(function(d) { m[d.id] = []; });

  const total = ALL_SKILLS.length;

  const pct = total ? Math.round(checked / total * 100) : 0;
  $('#stat-total').textContent = total;
  $('#stat-checked').textContent = checked;
  $('#stat-percent').textContent = pct + '%';
  const bar = $('#progress-bar-fill'); if (bar) bar.style.width = pct + '%';
  $('#cnt-list').textContent = total;
  $('#cnt-iv').textContent = INTERVIEW_QUESTIONS.length;
}

function initTabs() {
  $$('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      $$('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      $$('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

/* ============ 能力图谱 ============ */
function renderMap() {
  const root = $('#tab-map');

  // 渲染所有卡片
  const cardsHtml = DOMAINS.map(d => {
    const skills = SKILLS_BY_DOMAIN[d.id] || [];
    const mustCount = skills.filter(s => s.must).length;
    const chipsHtml = (d.chips || []).map(c => `<span class="chip">${esc(c)}</span>`).join('');

    const detailHtml = [
      d.overview && { icon:'📖', label:'核心要点', text:d.overview },
      d.focus    && { icon:'🎯', label:'重点掌握', text:d.focus },
      d.scenarios&& { icon:'💼', label:'适用场景', text:d.scenarios }
    ].filter(Boolean).map(s => `
      <div class="detail-section">
        <div class="detail-title">${s.icon} ${esc(s.label)}</div>
        <div class="detail-content">${esc(s.text)}</div>
      </div>
    `).join('');

    return `
      <div class="domain-card theme-${d.theme}" data-domain="${esc(d.id)}" id="domain-card-${esc(d.id)}">
        <div class="domain-head">
          <div class="domain-icon">${d.icon}</div>
          <div class="domain-title">
            <h3>${esc(d.name)}</h3>
            <div class="domain-meta"><span class="en-tag">${esc(d.en)}</span> · ${skills.length} 项技能 · ${mustCount} 项必备</div>
          </div>
        </div>
        <div class="domain-desc">${esc(d.desc)}</div>
        ${chipsHtml ? `<div class="chips">${chipsHtml}</div>` : ''}
        <div class="domain-detail">${detailHtml}</div>
        <div class="domain-actions">
          <button type="button" class="domain-btn domain-btn-detail" onclick="toggleDomainDetail('${esc(d.id)}')">📖 查看详情</button>
          <button type="button" class="domain-btn domain-btn-skills" onclick="gotoDomainSkills('${esc(d.id)}')">查看技能点 →</button>
        </div>
      </div>
    `;
  }).join('');

  root.innerHTML = `
    <div class="tab-intro">
      <h2>BI 数据分析师 · 12 大能力域</h2>
      <p>覆盖从 <b>数据思维</b> 到 <b>AI 工具</b> 的完整能力体系，共 <b>${ALL_SKILLS.length}</b> 个技能点，其中 <b>${MUST_TOTAL}</b> 项为必备。每张卡片包含「核心要点 / 重点掌握 / 适用场景」三段说明，点击「查看详情」展开，点击「查看技能点 →」跳转到学习清单。</p>
    </div>
    <div class="map-toolbar">
      <button type="button" class="ghost-btn" onclick="expandAllDomains()">📂 全部展开</button>
      <button type="button" class="ghost-btn" onclick="collapseAllDomains()">📁 全部收起</button>
    </div>
    <div class="domain-grid">${cardsHtml}</div>
  `;
}

// 全局函数（挂在 window 上供 inline onclick 调用）
window.toggleDomainDetail = function(domainId) {
  var card = document.getElementById('domain-card-' + domainId);
  if (!card) return;
  var btn = card.querySelector('.domain-btn-detail');
  var open = card.classList.toggle('detail-open');
  if (btn) btn.textContent = open ? '📕 收起详情' : '📖 查看详情';
};

window.gotoDomainSkills = function(domainId) {
  jumpToList(domainId);
};

window.expandAllDomains = function() {
  var cards = document.querySelectorAll('.domain-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.add('detail-open');
    var btn = cards[i].querySelector('.domain-btn-detail');
    if (btn) btn.textContent = '📕 收起详情';
  }
};

window.collapseAllDomains = function() {
  var cards = document.querySelectorAll('.domain-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.remove('detail-open');
    var btn = cards[i].querySelector('.domain-btn-detail');
    if (btn) btn.textContent = '📖 查看详情';
  }
};

function jumpToList(domainId) {
  var tabBtns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < tabBtns.length; i++) {
    if (tabBtns[i].getAttribute('data-tab') === 'list') tabBtns[i].classList.add('active');
    else tabBtns[i].classList.remove('active');
  }
  var contents = document.querySelectorAll('.tab-content');
  for (var j = 0; j < contents.length; j++) {
    if (contents[j].id === 'tab-list') contents[j].classList.add('active');
    else contents[j].classList.remove('active');
  }
  var section = document.getElementById('domain-section-' + domainId);
  if (section) {
    section.classList.add('expanded');
    setTimeout(function() { section.scrollIntoView({ behavior:'smooth', block:'start' }); }, 50);
  }
}

/* ============ 学习清单 ============ */
let listFilters = { tier:'all', must:false, keyword:'' };

function renderList() {
  const root = $('#tab-list');
  root.innerHTML = `
    <div class="tab-intro">
      <h2>学习清单 · 按能力域分组</h2>
      <p>勾选已掌握的技能，进度自动保存到浏览器本地。可按等级过滤、关键词搜索、或只看必备项。建议先把 <b>${MUST_TOTAL} 项必备</b> 全部勾完再补齐其余。</p>
    </div>
    <div class="list-controls">
      <input id="list-search" class="search-input" type="text" placeholder="🔍 搜索技能名称、描述、资源…" />
      <div class="filter-group">
        <span class="filter-label">等级：</span>
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="junior">初级</button>
        <button class="filter-btn" data-filter="mid">中级</button>
        <button class="filter-btn" data-filter="senior">高级</button>
      </div>
      <label class="must-toggle">
        <input type="checkbox" id="must-only" /> 只看必备
      </label>
      <button class="ghost-btn" id="reset-progress">重置进度</button>
    </div>
    <div id="list-container"></div>
  `;

  $('#list-search').addEventListener('input', e => {
    listFilters.keyword = e.target.value.trim().toLowerCase();
    renderListContainer();
  });
  $$('.filter-btn', root).forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.filter-btn', root).forEach(b => b.classList.toggle('active', b === btn));
      listFilters.tier = btn.dataset.filter;
      renderListContainer();
    });
  });
  $('#must-only').addEventListener('change', e => {
    listFilters.must = e.target.checked;
    renderListContainer();
  });
  $('#reset-progress').addEventListener('click', () => {
    if (confirm('确定要清空所有勾选进度吗？此操作不可撤销。')) {
      CHECKED.clear(); saveChecked(CHECKED);
      renderListContainer(); updateStats();
    }
  });
  renderListContainer();
}

function renderListContainer() {
  const container = $('#list-container');
  const kw = listFilters.keyword;

  const html = DOMAINS.map(d => {
    const skills = (SKILLS_BY_DOMAIN[d.id] || []).filter(s => {
      if (listFilters.tier !== 'all' && s.tier !== listFilters.tier) return false;
      if (listFilters.must && !s.must) return false;
      if (kw) {
        const hay = [s.name, s.desc, ...(s.resources||[]).map(r=>r.name)].join(' ').toLowerCase();
        if (!hay.includes(kw)) return false;
      }
      return true;
    });
    if (!skills.length) return '';
    const checkedInDomain = skills.filter(s => CHECKED.has(s.id)).length;
    const skillsHtml = skills.map(s => skillItemHtml(s)).join('');

    return `
      <div class="domain-section expanded theme-${d.theme}" id="domain-section-${d.id}">
        <div class="domain-section-head">
          <div class="dsh-left">
            <span class="dsh-icon">${d.icon}</span>
            <span class="dsh-title">${esc(d.name)}</span>
            <span class="dsh-count">${checkedInDomain}/${skills.length}</span>
          </div>
          <span class="dsh-toggle">▼</span>
        </div>
        <div class="domain-section-body">${skillsHtml}</div>
      </div>
    `;
  }).join('');

  container.innerHTML = html || `<div class="empty">😴 没有匹配的技能点，试试调整过滤条件</div>`;

  $$('.domain-section-head', container).forEach(head => {
    head.addEventListener('click', () => head.parentElement.classList.toggle('expanded'));
  });
  $$('.skill-check', container).forEach(box => {
    box.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = box.dataset.id;
      if (CHECKED.has(id)) { CHECKED.delete(id); box.classList.remove('checked'); }
      else { CHECKED.add(id); box.classList.add('checked'); }
      saveChecked(CHECKED);
      const section = box.closest('.domain-section');
      const head = $('.dsh-count', section);
      const all = $$('.skill-check', section);
      const checked = all.filter(b => b.classList.contains('checked')).length;
      head.textContent = `${checked}/${all.length}`;
      updateStats();
    });
  });
}

function skillItemHtml(s) {
  const isChecked = CHECKED.has(s.id);
  const tierBadge = `<span class="tier-badge ${TIER_CLASS[s.tier]}">${TIER_LABEL[s.tier]}</span>`;
  const mustBadge = s.must ? `<span class="must-badge">必备</span>` : '';
  const typeIcon = { '书籍':'📖','课程':'🎓','文档':'📄','工具':'🛠️',
                     '文章':'📝','视频':'🎬','实战':'💪','社区':'🌐' };
  const resources = (s.resources || []).map(r => {
    const ico = typeIcon[r.type] || '🔗';
    const inner = `${ico} ${esc(r.name)}`;
    const link = r.url
      ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${inner}</a>`
      : `<span class="res-text">${inner}</span>`;
    return `<li><span class="res-type">[${esc(r.type)}]</span> ${link}</li>`;
  }).join('');
  return `
    <div class="skill-item">
      <div class="skill-check ${isChecked ? 'checked' : ''}" data-id="${esc(s.id)}" title="点击勾选">
        <svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="skill-body">
        <div class="skill-head">
          <span class="skill-name">${esc(s.name)}</span>
          ${tierBadge}
          ${mustBadge}
        </div>
        ${s.desc ? `<div class="skill-desc">${esc(s.desc)}</div>` : ''}
        ${resources ? `<ul class="skill-resources">${resources}</ul>` : ''}
      </div>
    </div>
  `;
}

/* ============ 评估标准 ============ */
function renderEval() {
  const root = $('#tab-eval');

  const cardsHtml = EVAL_LEVELS.map(lv => {
    const dimHtml = Object.entries(lv.detail || {}).map(([dim, desc]) => `
      <li>
        <span class="eval-dim">${esc(dim)}</span>
        <span class="eval-dim-desc">${esc(desc)}</span>
      </li>
    `).join('');
    return `
      <div class="eval-card theme-${lv.tier}">
        <div class="eval-head">
          <div class="eval-head-left">
            <span class="eval-icon">${lv.icon}</span>
            <div>
              <div class="eval-level">${esc(lv.name)}</div>
              <div class="eval-en">${esc(lv.en)} · ${esc(lv.yearExp)}</div>
            </div>
          </div>
          <span class="eval-salary">${esc(lv.salary)}</span>
        </div>
        <div class="eval-must">📌 ${esc(lv.mustCount)}</div>
        <div class="eval-desc">${esc(lv.desc)}</div>
        <div class="eval-criteria-title">核心能力标准</div>
        <ul class="eval-criteria">${dimHtml}</ul>
      </div>
    `;
  }).join('');

  const rubricRows = EVAL_RUBRIC.map(r => {
    const dotCell = (lvl) => {
      const score = r[lvl] || 0;
      let dots = '';
      for (let i = 1; i <= 5; i++) {
        dots += `<span class="dot ${i <= score ? 'filled' : 'empty'}"></span>`;
      }
      return `<td><div class="rubric-cell"><div class="dots">${dots}</div><div class="score-num">${score}/5</div></div></td>`;
    };
    return `
      <tr>
        <td class="rubric-dim">${esc(r.domain)}</td>
        <td class="rubric-weight">${esc(r.weight)}</td>
        ${dotCell('junior')}
        ${dotCell('mid')}
        ${dotCell('senior')}
      </tr>
    `;
  }).join('');

  root.innerHTML = `
    <div class="tab-intro">
      <h2>BI 数据分析师能力评估标准</h2>
      <p>三级能力梯度参考二手奢侈品 ERP 团队场景制定，薪资为一线/新一线城市市场均值。下方<b>评估维度表</b>可作为面试评分卡、定级评审表和试用期考核标准使用。</p>
    </div>
    <div class="eval-grid">${cardsHtml}</div>

    <h3 class="section-h3">📊 评估维度 × 等级评分表（权重制）</h3>
    <p class="section-desc">12 个评估维度按权重打分，每项 0-5 分。建议总分 = Σ(维度得分 × 权重 × 20)。<b>≥ 80 分</b>视为该等级合格。本表可直接复制到面试评分卡作为打分依据。</p>
    <div class="rubric-wrap">
      <table class="rubric-table">
        <thead>
          <tr>
            <th>评估维度</th>
            <th>权重</th>
            <th class="th-junior">初级达标</th>
            <th class="th-mid">中级达标</th>
            <th class="th-senior">高级达标</th>
          </tr>
        </thead>
        <tbody>${rubricRows}</tbody>
      </table>
    </div>
  `;
}

/* ============ 面试题库 ============ */
function renderInterview() {
  const root = $('#tab-interview');
  const groups = { junior:[], mid:[], senior:[] };
  INTERVIEW_QUESTIONS.forEach(q => { if (groups[q.tier]) groups[q.tier].push(q); });

  const groupHtml = (tier, title) => {
    const list = groups[tier];
    if (!list.length) return '';
    return `
      <div class="iv-group">
        <h3 class="iv-group-title">
          <span class="tier-badge ${TIER_CLASS[tier]}">${TIER_LABEL[tier]}</span>
          <span class="iv-group-name">${esc(title)}</span>
          <span class="iv-group-count">共 ${list.length} 题</span>
        </h3>
        ${list.map((q, i) => `
          <div class="interview-card">
            <div class="iv-head">
              <div class="iv-q">
                <span class="iv-num">Q${i+1}</span>
                <span class="iv-text">${esc(q.q)}</span>
              </div>
              <div class="iv-tags">
                <span class="iv-tag">${esc(q.tag || '')}</span>
                <span class="iv-arrow">▼</span>
              </div>
            </div>
            <div class="iv-body">
              ${q.考察 ? `<div class="iv-section"><div class="iv-section-title">🎯 考察点</div><div class="iv-section-content">${esc(q.考察)}</div></div>` : ''}
              ${q.参考 ? `<div class="iv-section"><div class="iv-section-title">💡 参考答案</div><div class="iv-section-content">${esc(q.参考)}</div></div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  };

  root.innerHTML = `
    <div class="tab-intro">
      <h2>BI 数据分析师面试题库</h2>
      <p>按等级分层的 <b>${INTERVIEW_QUESTIONS.length} 道题</b>，覆盖 SQL、统计、业务、可视化、数仓、AI 工具与团队管理。点击题目可展开「考察点」与「参考答案」。建议初级问 5 题 SQL+业务，中级问 5 题归因+实验，高级问 4 题架构+管理。</p>
    </div>
    ${groupHtml('junior', '初级面试题')}
    ${groupHtml('mid', '中级面试题')}
    ${groupHtml('senior', '高级面试题')}
  `;

  $$('.iv-head', root).forEach(head => {
    head.addEventListener('click', () => head.parentElement.classList.toggle('expanded'));
  });
}

/* ============ 成长路径 ============ */
function renderPath() {
  const root = $('#tab-path');
  const cardsHtml = PATHS.map(p => {
    const itemsHtml = p.items.map((it, idx) => `
      <li class="path-item">
        <span class="path-item-num">${idx + 1}</span>
        <span class="path-item-text">${esc(it)}</span>
      </li>
    `).join('');
    return `
      <div class="path-card theme-${p.tier}">
        <div class="path-head">
          <div class="path-stage">阶段 ${p.num}</div>
          <span class="tier-badge ${TIER_CLASS[p.tier]}">${TIER_LABEL[p.tier]}</span>
        </div>
        <div class="path-title">${esc(p.title)}</div>
        <div class="path-duration">📅 ${esc(p.duration)}</div>
        <div class="path-goal"><b>🎯 阶段目标：</b>${esc(p.goal)}</div>
        <div class="path-items-title">关键里程碑（共 ${p.items.length} 项）</div>
        <ul class="path-items">${itemsHtml}</ul>
      </div>
    `;
  }).join('');

  root.innerHTML = `
    <div class="tab-intro">
      <h2>BI 数据分析师成长路径</h2>
      <p>三段式成长路径，配合<b>学习清单</b>同步推进。每阶段都有明确目标和关键里程碑。建议把学习清单当作打卡表，每完成一项就勾选一次，跟着路径走完整 12-18 个月，可成长为独立的中级分析师。</p>
    </div>
    <div class="path-grid">${cardsHtml}</div>
  `;
}

/* ============ 初始化 ============ */
function init() {
  try {
    initTabs();
    renderMap();
    renderList();
    renderEval();
    renderInterview();
    renderPath();
    updateStats();
  } catch (e) {
    // 把错误显示到页面，便于排查
    var box = document.createElement('div');
    box.style.cssText = 'position:fixed;top:10px;left:10px;right:10px;padding:16px;background:#FFECE8;color:#F53F3F;border:1px solid #F53F3F;border-radius:8px;z-index:99999;font-family:monospace;font-size:13px;white-space:pre-wrap;';
    box.textContent = '❌ 页面初始化失败：\n' + (e && e.message ? e.message : e) + '\n\n' + (e && e.stack ? e.stack : '');
    document.body.appendChild(box);
    throw e;
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

</script>
